<!DOCTYPE html>
<html>
  <head>
    <title>DanielMankin-StarlightOrchard</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene
      background="color: #05080d"
      renderer="colorManagement: true"
      shadow="type: pcfsoft"
      vr-mode-ui="enabled: true"
    >
      <a-assets timeout="20000">
        <img id="scene-sky" src="Assets/starlight-sky.jpg?v=2">
        <a-asset-item id="tree-obj" src="Assets/Lowpoly_tree_sample.obj"></a-asset-item>
        <a-asset-item id="tree-mtl" src="Assets/Lowpoly_tree_sample.mtl"></a-asset-item>
        <a-asset-item id="lantern-model" src="Assets/Lantern.glb"></a-asset-item>
      </a-assets>

      <a-entity position="0 1.65 4">
        <a-camera rotation="-4 0 0" wasd-controls="acceleration: 35"></a-camera>
      </a-entity>

      <a-light type="ambient" color="#a8c0d6" intensity="0.88"></a-light>
      <a-light
        type="directional"
        color="#d8ecff"
        intensity="1.1"
        position="-8 14 10"
        shadow-map-height="1024"
        shadow-map-width="1024"
      ></a-light>
      <a-light type="point" color="#7cecff" intensity="1.35" distance="28" position="0 4 -16"></a-light>
      <a-light type="point" color="#5de3da" intensity="0.85" distance="24" position="10 3 -10"></a-light>
      <a-light type="point" color="#86dfff" intensity="0.55" distance="18" position="0 2 -4"></a-light>

      <a-sky src="#scene-sky" rotation="0 -110 0" radius="90"></a-sky>

      <a-plane
        position="0 0 -16"
        rotation="-90 0 0"
        width="86"
        height="86"
        color="#0c1718"
        shadow="receive: true"
      ></a-plane>

      <a-plane
        position="0 0.02 -6"
        rotation="-90 0 0"
        width="4.2"
        height="26"
        color="#1b232b"
      ></a-plane>

      <a-box position="-1.2 0.1 -0.5" width="1.1" height="0.14" depth="1.4" color="#313944" rotation="0 -10 0"></a-box>
      <a-box position="1.1 0.1 -2.8" width="1.15" height="0.14" depth="1.35" color="#313944" rotation="0 8 0"></a-box>
      <a-box position="-0.8 0.1 -5.2" width="1.1" height="0.14" depth="1.3" color="#313944" rotation="0 -6 0"></a-box>
      <a-box position="1.3 0.1 -7.7" width="1.2" height="0.14" depth="1.45" color="#313944" rotation="0 9 0"></a-box>

      <a-entity position="0 0 -16">
        <a-cylinder
          position="0 0.18 0"
          radius="9.4"
          height="0.36"
          color="#242d34"
          shadow="receive: true"
        ></a-cylinder>
        <a-cylinder position="0 0.34 0" radius="6.8" height="0.18" color="#313b43"></a-cylinder>
        <a-ring
          position="0 0.44 0"
          rotation="-90 0 0"
          radius-inner="5.15"
          radius-outer="5.55"
          color="#495866"
        ></a-ring>
        <a-circle
          position="0 0.45 0"
          rotation="-90 0 0"
          radius="2.45"
          material="color: #45dbe4; opacity: 0.72; transparent: true"
        ></a-circle>
        <a-cylinder position="0 0.92 0" radius="1.1" height="1.4" color="#39424a"></a-cylinder>
        <a-cylinder position="0 1.7 0" radius="0.76" height="0.2" color="#586674"></a-cylinder>
      </a-entity>

      <a-entity
        position="0 3.25 -16"
        animation__float="property: position; to: 0 3.55 -16; dir: alternate; dur: 2400; loop: true; easing: easeInOutSine"
      >
        <a-entity gltf-model="#lantern-model" position="0 -0.45 0" rotation="0 0 0" scale="0.55 0.55 0.55"></a-entity>
        <a-torus
          radius="1.12"
          radius-tubular="0.06"
          rotation="90 0 0"
          material="color: #d6feff; emissive: #7be8ef; emissiveIntensity: 0.35"
          animation="property: rotation; to: 90 360 0; loop: true; dur: 10000; easing: linear"
        ></a-torus>
      </a-entity>

      <a-entity
        gltf-model="#lantern-model"
        position="-2.8 0.46 -14.8"
        rotation="0 18 0"
        scale="0.3 0.3 0.3"
        animation__pulse="property: position; to: -2.8 0.6 -14.8; dir: alternate; dur: 1900; loop: true; easing: easeInOutSine"
      ></a-entity>
      <a-entity
        gltf-model="#lantern-model"
        position="2.6 0.46 -15.2"
        rotation="0 -22 0"
        scale="0.3 0.3 0.3"
        animation__pulse="property: position; to: 2.6 0.58 -15.2; dir: alternate; dur: 2100; loop: true; easing: easeInOutSine"
      ></a-entity>
      <a-entity
        gltf-model="#lantern-model"
        position="1.4 0.46 -18.7"
        rotation="0 42 0"
        scale="0.26 0.26 0.26"
      ></a-entity>
      <a-entity
        gltf-model="#lantern-model"
        position="-1.2 0.46 -18.9"
        rotation="0 -30 0"
        scale="0.26 0.26 0.26"
      ></a-entity>
      <a-entity
        gltf-model="#lantern-model"
        position="0.2 0.46 -12.8"
        rotation="0 12 0"
        scale="0.22 0.22 0.22"
      ></a-entity>

      <a-entity obj-model="obj: #tree-obj; mtl: #tree-mtl" position="-12 0 -19" rotation="0 16 0" scale="0.34 0.34 0.34"></a-entity>
      <a-entity obj-model="obj: #tree-obj; mtl: #tree-mtl" position="-8.8 0 -26.4" rotation="0 -12 0" scale="0.43 0.43 0.43"></a-entity>
      <a-entity obj-model="obj: #tree-obj; mtl: #tree-mtl" position="-1.5 0 -29.5" rotation="0 6 0" scale="0.37 0.37 0.37"></a-entity>
      <a-entity obj-model="obj: #tree-obj; mtl: #tree-mtl" position="7.8 0 -27.8" rotation="0 28 0" scale="0.46 0.46 0.46"></a-entity>
      <a-entity obj-model="obj: #tree-obj; mtl: #tree-mtl" position="12.6 0 -18.6" rotation="0 -18 0" scale="0.35 0.35 0.35"></a-entity>
      <a-entity obj-model="obj: #tree-obj; mtl: #tree-mtl" position="10.8 0 -9.4" rotation="0 12 0" scale="0.31 0.31 0.31"></a-entity>
      <a-entity obj-model="obj: #tree-obj; mtl: #tree-mtl" position="1.8 0 -6.7" rotation="0 -24 0" scale="0.26 0.26 0.26"></a-entity>
      <a-entity obj-model="obj: #tree-obj; mtl: #tree-mtl" position="-8.5 0 -8.2" rotation="0 33 0" scale="0.29 0.29 0.29"></a-entity>

      <a-entity gltf-model="#lantern-model" position="-14 0.12 -12.5" rotation="0 12 0" scale="0.22 0.22 0.22"></a-entity>
      <a-entity gltf-model="#lantern-model" position="14.6 0.12 -23" rotation="0 -22 0" scale="0.24 0.24 0.24"></a-entity>
      <a-entity gltf-model="#lantern-model" position="-5.2 0.12 -31.5" rotation="0 40 0" scale="0.2 0.2 0.2"></a-entity>

      <a-cone position="-24 5 -42" radius-bottom="11" radius-top="0.8" height="16" color="#172127"></a-cone>
      <a-cone position="-11 4.5 -44" radius-bottom="8.5" radius-top="0.6" height="13.5" color="#19232a"></a-cone>
      <a-cone position="5 6 -45" radius-bottom="11.5" radius-top="0.9" height="18" color="#182128"></a-cone>
      <a-cone position="20 4.6 -41" radius-bottom="9.2" radius-top="0.7" height="14.5" color="#172028"></a-cone>

    </a-scene>
  </body>
</html>
